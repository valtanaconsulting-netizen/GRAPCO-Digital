
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#163659"/>
      <stop offset="100%" stop-color="#0B1F39"/>
    </linearGradient>
    <clipPath id="tile"><rect x="92" y="92" width="328" height="328" rx="60"/></clipPath>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- filo dorado superior sutil -->
  <rect x="0" y="0" width="512" height="6" fill="#E5A82F" opacity="0.85" rx="3"/>
  <!-- tile blanco con el logo -->
  <rect x="92" y="92" width="328" height="328" rx="60" fill="#ffffff"/>
  <image href="data:image/jpeg;base64," x="104" y="104" width="304" height="304" clip-path="url(#tile)" preserveAspectRatio="xMidYMid slice"/>
  <!-- aro dorado del tile -->
  <rect x="92" y="92" width="328" height="328" rx="60" fill="none" stroke="#E5A82F" stroke-width="7"/>
</svg>